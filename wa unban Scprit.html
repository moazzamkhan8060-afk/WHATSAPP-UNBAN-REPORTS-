<body>
  <div class="container">
    <h1>MOAZZAM WHATSAPP UNBAN TOOL</h1>
    
    <label>SELECT UNBAN OPTION:</label>
    <select id="banType">
      <option value="normal">NORMAL UNBANNED</option>
      <option value="permanent" selected>PERMANENT UNBANNED</option>
    </select>

    <hr>

    <label>ENTER YOUR NUMBER</label>
    <input type="text" id="phoneNumber" placeholder="e.g. +923190228599">

    <hr>

    <label>SELECT PROMPT:</label>
    <select id="promptSelect">
      <option value="0" class="prompt-option">PROMPT 1: Standard unban request</option>
      <option value="1" class="prompt-option">PROMPT 2: Mistaken ban appeal</option>
      <option value="2" class="prompt-option">PROMPT 3: Policy compliance promise</option>
      <option value="3" class="prompt-option">PROMPT 4: Account review request</option>
      <option value="4" class="prompt-option">PROMPT 5: Terms violation appeal</option>
      <option value="5" class="prompt-option" selected>PROMPT 6: FINAL CHANCE REQUEST</option>
    </select>

    <button onclick="sendRequest()">SEND UNBAN REQUEST</button>

    <div class="footer">
      <p>💻 Developed by <strong>Moazzam</strong> | © 2025</p>
      <a class="whatsapp-link" href="https://whatsapp.com/channel/0029VbB5rqQIiRokILC0p23M" target="_blank">JOIN OUR WHATSAPP CHANNEL</a>
    </div>
  </div>

  <script>
    const prompts = {
      normal: [
        "Hello WhatsApp Support, my number {number} was mistakenly banned. Kindly review and restore my access. Thank you.",
        "Dear WhatsApp team, my account {number} got banned accidentally. Please help me recover it.",
        "Hi, I believe my number {number} was wrongly banned. Requesting a quick reactivation.",
        "I am facing an issue as my number {number} is banned. Kindly verify and unban it.",
        "To WhatsApp Support: Please check number {number}, it appears to be banned without reason.",
        "My number {number} got banned but I have not violated any terms. Please reinstate access."
      ],
      permanent: [
        "Dear WhatsApp Support, I humbly request a second chance for my number {number}. I understand the policies and promise to follow all rules henceforth.",
        "My number {number} is permanently banned. I deeply regret any violation. Kindly give me one more opportunity.",
        "This is a request to reconsider the permanent ban on my number {number}. I assure compliance in the future.",
        "Please unban my number {number}. I take full responsibility and seek one final chance to use WhatsApp responsibly.",
        "I acknowledge mistakes on number {number}. Requesting a final opportunity and committing to policy adherence.",
        "Dear WhatsApp Support,\n\nMy number has been permanently banned, and I strongly believe this may be a mistake or an automated action. I respectfully request a detailed review of my account and activity.\n\nI always strive to follow WhatsApp's Terms of Service and community guidelines. If any issues were caused unintentionally, I assure you it was not with malicious intent, and I am ready to correct any mistakes.\n\nPlease consider reinstating my number. I truly rely on WhatsApp for personal and professional communication. Your assistance would mean a lot.\n\nPhone Number: {number}.\n\nThank you for your time and understanding.\n\nBest regards."
      ]
    };

    function sendRequest() {
      const number = document.getElementById('phoneNumber').value;
      const type = document.getElementById('banType').value;
      const promptIndex = document.getElementById('promptSelect').value;
      const selectedPrompt = prompts[type][promptIndex].replace('{number}', number);
      
      const subject = 'Unban Request for ' + number;
      const mailtoLink = 'mailto:support@support.whatsapp.com?subject=' + 
                       encodeURIComponent(subject) + 
                       '&body=' + 
                       encodeURIComponent(selectedPrompt);
      
      window.location.href = mailtoLink;
    }
  </script>
